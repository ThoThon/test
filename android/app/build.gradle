plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.viettel.ttcntt.vbhxh"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }
    
    defaultConfig {
        applicationId "com.viettel.ttcntt.vbhxh"
        minSdk 23
        targetSdk 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        // Không cần cấu hình signingConfigs cho dev, uat, prodsds flavors để sử dụng debug keystore mặc định
        // dev {}
        // uat {}
        // prodsds {}

        prod {
            def keystoreProperties = new Properties()
            def keystorePropertiesFile = rootProject.file('key.properties')
            if (keystorePropertiesFile.exists()) {
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
            }

            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
        }
    }

    flavorDimensions "default"
    productFlavors {
        dev {
            dimension "default"
            applicationIdSuffix ".dev"
            manifestPlaceholders = [appName: "vBHXH [DEV]"]
            // Set signingConfig.debug để sử dụng debug keystore mặc định
            signingConfig signingConfigs.debug
        }
        
        uat {
            dimension "default"
            applicationIdSuffix ".uat"
            manifestPlaceholders = [appName: "vBHXH [UAT]"]
            // Set signingConfig.debug để sử dụng debug keystore mặc định
            signingConfig signingConfigs.debug
        }

        prodsds {
            dimension "default"
            applicationIdSuffix ".prod"
            manifestPlaceholders = [appName: "vBHXH [PROD]"]
            // Set signingConfig.debug để sử dụng debug keystore mặc định
            signingConfig signingConfigs.debug
        }

        prod {
            dimension "default"
            applicationIdSuffix ""
            manifestPlaceholders = [appName: "vBHXH"]
            signingConfig signingConfigs.prod
        }
    }

    dependencies {
        //implementation 'com.android.support:multidex:1.0.3'
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"
    // Import the BoM for the Firebase platform
    //implementation platform('com.google.firebase:firebase-bom:32.2.0')
    // When using the BoM, you don't specify versions in Firebase library dependencies
    //implementation 'com.google.firebase:firebase-analytics'
}

flutter {
    source = "../.."
}